<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rental Receipt</title>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- html2canvas -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
}

h2 { margin-bottom: 10px; }

input {
  width: 100%;
  max-width: 380px;
  padding: 12px;
  margin: 6px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.receipt {
  width: 100%;
  max-width: 380px;
  background: white;
  padding: 20px;
  border-radius: 12px;
  margin-top: 10px;
}

.row {
  display: flex;
  justify-content: space-between;
  margin: 8px 0;
}

.total {
  margin-top: 15px;
  font-weight: bold;
  font-size: 18px;
}

button {
  width: 100%;
  max-width: 380px;
  padding: 14px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  color: white;
}

.btn-generate { background: #7e22ce; }
.btn-share { background: #007aff; }

/* toast */
.toast {
  position: fixed;
  bottom: 20px;
  background: black;
  color: white;
  padding: 10px 20px;
  border-radius: 20px;
}
</style>
</head>

<body>

<h2>Rental Receipt</h2>

<input id="tenant" placeholder="Tenant Name" oninput="update()" />
<input id="amount" type="number" placeholder="Amount" oninput="update()" />
<input id="date" type="date" oninput="update()" />

<div class="receipt" id="receipt">
  <h3 id="r-tenant">Tenant</h3>
  <div class="row"><span>Date</span><span id="r-date">-</span></div>
  <div class="row"><span>Amount</span><span id="r-amount">$0</span></div>
  <div class="total">Paid</div>
</div>

<button class="btn-generate" onclick="generatePDF()">Generate PDF</button>
<button class="btn-share" onclick="sharePDF()">Share PDF 📤</button>

<script>
function update() {
  document.getElementById("r-tenant").innerText =
    document.getElementById("tenant").value || "Tenant";

  document.getElementById("r-date").innerText =
    document.getElementById("date").value || "-";

  document.getElementById("r-amount").innerText =
    "$" + (document.getElementById("amount").value || "0");
}

// create PDF helper
async function createPDFBlob() {
  const receipt = document.getElementById("receipt");

  const canvas = await html2canvas(receipt, {
    scale: 2,
    backgroundColor: "#ffffff"
  });

  const imgData = canvas.toDataURL("image/png");
  const { jsPDF } = window.jspdf;

  const pdf = new jsPDF({
    orientation: "portrait",
    unit: "px",
    format: [canvas.width, canvas.height]
  });

  pdf.addImage(imgData, "PNG", 0, 0);

  return pdf;
}

// GENERATE (download)
async function generatePDF() {
  showToast("Generating PDF...");

  const pdf = await createPDFBlob();

  const tenant = document.getElementById("tenant").value || "receipt";
  const date = document.getElementById("date").value || "";

  pdf.save(`${tenant}_${date}.pdf`);

  showToast("Downloaded!");
}

// SHARE (mobile)
async function sharePDF() {
  showToast("Preparing PDF...");

  const pdf = await createPDFBlob();

  const tenant = document.getElementById("tenant").value || "receipt";
  const date = document.getElementById("date").value || "";

  const blob = pdf.output("blob");

  const file = new File([blob], `${tenant}_${date}.pdf`, {
    type: "application/pdf"
  });

  // fallback if not supported
  if (!navigator.canShare || !navigator.canShare({ files: [file] })) {
    pdf.save(`${tenant}_${date}.pdf`);
    showToast("Downloaded instead");
    return;
  }

  try {
    await navigator.share({
      files: [file],
      title: "Rental Receipt",
      text: "Here is your receipt"
    });

    showToast("Shared!");
  } catch (err) {
    showToast("Cancelled");
  }
}

// toast
function showToast(msg) {
  const t = document.createElement("div");
  t.className = "toast";
  t.innerText = msg;
  document.body.appendChild(t);

  setTimeout(() => t.remove(), 2000);
}
</script>

</body>
</html>
